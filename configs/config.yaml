data:
  raw_path: "../titanic.csv"
  test_size: 0.2
  random_state: 42

features:
  numeric: ["Pclass", "Age", "SibSp", "Parch", "Fare"]
  categorical: ["Sex", "Embarked"]
  target: "Survived"

models:
  logistic_regression:
    max_iter: 1000
    random_state: 42

  random_forest:
    n_estimators: 100
    max_depth: 5
    random_state: 42

  gradient_boosting:
    n_estimators: 100
    learning_rate: 0.1
    max_depth: 3
    random_state: 42

mlflow:
  experiment_name: "Titanic-Survival-Prediction"
  tracking_uri: "sqlite:///mlflow.db"
  registered_model_name: "titanic_best_model"
